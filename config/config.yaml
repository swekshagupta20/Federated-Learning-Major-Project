# ---------------------------------------------------
# FEDERATED LEARNING CONFIG
# ---------------------------------------------------

num_clients: 5
num_rounds: 3

# ---------------------------------------------------
# DATA CONFIG
# ---------------------------------------------------

dirichlet_alpha: 0.5
batch_size: 32

# ---------------------------------------------------
# TRAINING CONFIG
# ---------------------------------------------------

local_epochs: 1
learning_rate: 0.001

# ---------------------------------------------------
# RL CONFIG
# ---------------------------------------------------

use_rl: true
rl_timesteps: 1000

# Reward balancing factor (λ)
reward_lambda: 0.5

# ---------------------------------------------------
# SIMULATION CONFIG
# ---------------------------------------------------

battery_drain: 5.0
latency_noise: 5
reliability_noise: 0.02